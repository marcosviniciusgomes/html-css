<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td {
            border: 1px solid gray;
            padding: 8px;
        }

        tr.destaque {
            background-color: aqua;
        }

        col.cnome {
            background-color: darkblue;
        }

        col.csexo {
            background-color: blue;
        }

        col.cidade {
            background-color: aqua;
        }

        col.cprof {
            background-color: lightskyblue;
        }
    </style>
</head>
<body>
    <h1>Exercicio de Tabela</h1>

    <table>

        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Paula</td>
            <td>F</td>
            <td>29</td>
            <td>Recepcionista</td>
        </tr>
        <tr>
            <td>Carlos José</td>
            <td>M</td>
            <td>34</td>
            <td>Mecanico</td>
        </tr>
        <tr>
            <td>Patricia</td>
            <td>F</td>
            <td>22</td>
            <td>Atendente</td>
        </tr>
        <tr>
            <td>Fabricio</td>
            <td>M</td>
            <td>45</td>
            <td>Advogado</td>
        </tr>
        <colgroup>
             <col class="cnome">
             <col class="csexo">
             <col class="cidade">
             <col class="cprof">
        </colgroup>
    </table>
</body>
</html>
